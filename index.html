<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koło Fortuny - Bitwa Drużyn i Piosenki</title>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        /* Kontener całoekranowy */
        .background-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('bg.png');
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
        }

        /* Panele drużyn po bokach */
        .team-panel {
            width: 220px;
            background: rgba(26, 26, 26, 0.85);
            border: 3px solid #d4af37;
            border-radius: 20px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 20;
            color: #fff;
        }

        .team-name {
            font-size: 22px;
            font-weight: bold;
            color: #d4af37;
            margin-bottom: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.5);
        }

        .score-display {
            font-size: 48px;
            font-weight: bold;
            margin: 15px 0;
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.2);
        }

        /* Przyciski kręcenia dla drużyn */
        .spin-btn-team {
            width: 100%;
            background: linear-gradient(135deg, #b8901c 0%, #d4af37 50%, #e5c158 100%);
            border: none;
            border-radius: 12px;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            color: #111;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: transform 0.1s, filter 0.2s;
        }

        .spin-btn-team:hover:not(:disabled) {
            filter: brightness(1.1);
        }

        .spin-btn-team:active:not(:disabled) {
            transform: scale(0.96);
        }

        .spin-btn-team:disabled {
            background: #444;
            color: #888;
            cursor: not-allowed;
            box-shadow: none;
        }

        /* Obszar koła */
        .wheel-area {
            position: absolute;
            width: 44.5vh; 
            height: 44.5vh;
            left: 50%;
            top: 42%; 
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .wheel-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .wheel-svg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #d4af37;
            box-shadow: 0 0 25px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,0,0,0.5);
            transition: transform 7s cubic-bezier(0.1, 0.9, 0.15, 1);
            background: #222;
            display: block;
        }

        .pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 42px;
            background: #d4af37;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 30;
            filter: drop-shadow(0px 5px 4px rgba(0,0,0,0.5));
        }

        /* Środek koła */
        .wheel-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 50px;
            height: 50px;
            background: radial-gradient(circle, #fff 0%, #d4af37 100%);
            border: 3px solid #b8901c;
            border-radius: 50%;
            z-index: 25;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .wheel-text {
            font-weight: bold;
            font-size: 14px;
            fill: #ffffff;
            font-family: sans-serif;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
        }

        /* Wynik na środku na dole */
        .result-display {
            position: absolute;
            bottom: 23%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 18px;
            color: #111;
            border: 3px solid #d4af37;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            display: none;
            z-index: 40;
            text-align: center;
        }

        /* --- SEKCJA KONKURSU MUZYCZNEGO (NOWOŚĆ) --- */
        .music-section {
            position: absolute;
            bottom: 2%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 750px;
            background: rgba(26, 26, 26, 0.9);
            border: 2px solid #d4af37;
            border-radius: 16px;
            padding: 10px 15px;
            display: flex;
            flex-direction: column;
            gap: 8px;
            z-index: 50;
            box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .music-title {
            font-size: 14px;
            font-weight: bold;
            color: #d4af37;
            text-align: center;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .music-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr) auto;
            gap: 8px;
            align-items: center;
        }

        .music-btn {
            background: linear-gradient(135deg, #222 0%, #333 100%);
            border: 1px solid #555;
            border-radius: 8px;
            padding: 10px 5px;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .music-btn span {
            font-size: 9px;
            color: #aaa;
            font-weight: normal;
            margin-top: 2px;
        }

        /* Kolorowanie przycisków P (Pytanie) i W (Wynik) */
        .btn-p:hover {
            border-color: #d4af37;
            background: linear-gradient(135deg, #b8901c 0%, #d4af37 100%);
            color: #111;
        }
        .btn-p:hover span { color: #222; }

        .btn-w:hover {
            border-color: #2ecc71;
            background: linear-gradient(135deg, #27ae60 0%, #2ecc71 100%);
            color: #111;
        }
        .btn-w:hover span { color: #222; }

        /* Efekt dla aktywnego odtwarzania */
        .music-btn.playing {
            border-color: #d4af37;
            box-shadow: 0 0 10px #d4af37;
            background: #d4af37;
            color: #111;
            animation: pulse 1s infinite alternate;
        }
        .music-btn.playing span { color: #222; }

        @keyframes pulse {
            0% { opacity: 0.8; }
            100% { opacity: 1; }
        }

        .music-stop-btn {
            background: #e74c3c;
            border: none;
            border-radius: 8px;
            padding: 10px 15px;
            font-size: 12px;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            height: 100%;
        }

        .music-stop-btn:hover {
            background: #c0392b;
        }
    </style>
</head>
<body>

<div class="background-container">
    
    <div class="team-panel">
        <div class="team-name">Drużyna Martyny</div>
        <div class="score-display" id="scoreMartyna">0</div>
        <button class="spin-btn-team" id="btnMartyna">Martyna kręci</button>
    </div>

    <div class="wheel-area">
        <div class="pointer"></div>
        <div class="wheel-center"></div>
        <div class="wheel-wrapper">
            <svg class="wheel-svg" id="wheel" viewBox="0 0 200 200">
                <g id="wheel-group"></g>
            </svg>
        </div>
    </div>

    <div class="team-panel">
        <div class="team-name">Drużyna Leszka</div>
        <div class="score-display" id="scoreLeszek">0</div>
        <button class="spin-btn-team" id="btnLeszek">Leszek kręci</button>
    </div>

    <div class="result-display" id="resultDisplay">Wynik: -</div>

    <div class="music-section">
        <div class="music-title">🎵 Konkurs muzyczny: Odgadnij dalszy ciąg 🎵</div>
        <div class="music-grid">
            <button class="music-btn btn-p" onclick="playTrack('Parostatek pytanie.m4a', this)">
                1P
                <span>Parostatek</span>
            </button>
            <button class="music-btn btn-w" onclick="playTrack('Parostatek wynik.m4a', this)">
                1W
                <span>Parostatek</span>
            </button>
            <button class="music-btn btn-p" onclick="playTrack('powiedz pytanie.m4a', this)">
                2P
                <span>Powiedz</span>
            </button>
            <button class="music-btn btn-w" onclick="playTrack('powiedz wynik.m4a', this)">
                2W
                <span>Powiedz</span>
            </button>
            <button class="music-btn btn-p" onclick="playTrack('mandacik pytanie.m4a', this)">
                3P
                <span>Mandacik</span>
            </button>
            <button class="music-btn btn-w" onclick="playTrack('mandacik wynik.m4a', this)">
                3W
                <span>Mandacik</span>
            </button>
            <button class="music-stop-btn" onclick="stopAudio()">STOP</button>
        </div>
    </div>

</div>

<script>
    const segments = ["5", "10", "50", "25", "-50", "-25", "kręć\n2 razy"];
    const colors = ["#1a1a1a", "#d4af37", "#333333", "#b8901c", "#222222", "#e5c158", "#444444"];
    
    const numSegments = segments.length;
    const anglePerSegment = 360 / numSegments;
    const wheelGroup = document.getElementById('wheel-group');

    // Generowanie pól SVG koła
    for (let i = 0; i < numSegments; i++) {
        const startAngle = i * anglePerSegment;
        const endAngle = startAngle + anglePerSegment;
        
        const r = 100; 
        const x1 = 100 + r * Math.cos((startAngle - 90) * Math.PI / 180);
        const y1 = 100 + r * Math.sin((startAngle - 90) * Math.PI / 180);
        const x2 = 100 + r * Math.cos((endAngle - 90) * Math.PI / 180);
        const y2 = 100 + r * Math.sin((endAngle - 90) * Math.PI / 180);
        
        const pathData = `M 100 100 L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`;
        
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", pathData);
        path.setAttribute("fill", colors[i % colors.length]);
        wheelGroup.appendChild(path);

        const textAngle = startAngle + anglePerSegment / 2;
        const textG = document.createElementNS("http://www.w3.org/2000/svg", "g");
        
        textG.setAttribute("transform", `rotate(${textAngle} 100 100) translate(100, 32)`);
        
        const textLines = segments[i].split('\n');
        textLines.forEach((line, index) => {
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.textContent = line;
            text.setAttribute("class", "wheel-text");
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("y", index * 14); 
            textG.appendChild(text);
        });
        
        wheelGroup.appendChild(textG);
    }

    const wheel = document.getElementById('wheel');
    const resultDisplay = document.getElementById('resultDisplay');
    const btnLeszek = document.getElementById('btnLeszek');
    const btnMartyna = document.getElementById('btnMartyna');
    const scoreLeszekEl = document.getElementById('scoreLeszek');
    const scoreMartynaEl = document.getElementById('scoreMartyna');

    let currentRotation = 0;
    let isSpinning = false;
    let activePlayer = ""; 

    let scores = {
        Leszek: 0,
        Martyna: 0
    };

    // --- SYNTEZA AUDIO DLA KOŁA ---
    let audioCtx = null;
    function initAudio() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }

    function playClickSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.04);
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(); osc.stop(audioCtx.currentTime + 0.05);
    }

    function playWinSound() {
        if (!audioCtx) return;
        const notes = [261.63, 329.63, 392.00, 523.25];
        const now = audioCtx.currentTime;
        notes.forEach((freq, index) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + index * 0.12);
            gain.gain.setValueAtTime(0, now + index * 0.12);
            gain.gain.linearRampToValueAtTime(0.2, now + index * 0.12 + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.12 + 0.3);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now + index * 0.12); osc.stop(now + index * 0.12 + 0.35);
        });
    }

    function simulateClicking(totalDuration, totalDegrees) {
        let elapsed = 0;
        const interval = 20;
        let lastSegmentIndex = -1;
        function getProgress(t) { return 1 - Math.pow(1 - t, 4); }

        const checkClick = setInterval(() => {
            elapsed += interval;
            const t = elapsed / totalDuration;
            if (t >= 1) { clearInterval(checkClick); return; }

            const currentProgressDegrees = totalDegrees * getProgress(t);
            const currentSegmentIndex = Math.floor((currentProgressDegrees % 360) / anglePerSegment);

            if (currentSegmentIndex !== lastSegmentIndex) {
                playClickSound();
                lastSegmentIndex = currentSegmentIndex;
            }
        }, interval);
    }

    function spinWheel(player) {
        if (isSpinning) return;
        
        initAudio();
        isSpinning = true;
        activePlayer = player;

        btnLeszek.disabled = true;
        btnMartyna.disabled = true;
        resultDisplay.style.display = 'none';

        const randomSpins = Math.floor(Math.random() * 5) + 8; 
        const randomDegrees = Math.floor(Math.random() * 360);
        const additionalDegrees = (randomSpins * 360) + randomDegrees;
        
        currentRotation += additionalDegrees;
        wheel.style.transform = `rotate(${currentRotation}deg)`;

        simulateClicking(7000, additionalDegrees);

        setTimeout(() => {
            isSpinning = false;
            
            btnLeszek.disabled = false;
            btnMartyna.disabled = false;

            let actualAngle = (360 - (currentRotation % 360)) % 360;
            let winningIndex = Math.floor(actualAngle / anglePerSegment);
            winningIndex = (winningIndex + numSegments) % numSegments;
            
            const prizeRaw = segments[winningIndex];
            const prizeClean = prizeRaw.replace('\n', ' ');

            if (prizeRaw.includes("kręć")) {
                resultDisplay.innerText = `Drużyna ${activePlayer === 'Leszek' ? 'Leszka' : 'Martyny'} losuje: ${prizeClean}!`;
            } else {
                const points = parseInt(prizeRaw, 10);
                scores[activePlayer] += points;
                
                if (activePlayer === "Leszek") {
                    scoreLeszekEl.innerText = scores.Leszek;
                } else {
                    scoreMartynaEl.innerText = scores.Martyna;
                }
                
                const displayPlayerName = activePlayer === 'Leszek' ? 'Leszka' : 'Martyny';
                if (points > 0) {
                    resultDisplay.innerText = `Drużyna ${displayPlayerName} zdobywa: +${points} pkt!`;
                } else {
                    resultDisplay.innerText = `Drużyna ${displayPlayerName} traci: ${points} pkt!`;
                }
            }
            
            resultDisplay.style.display = 'block';
            playWinSound();
        }, 7000);
    }

    btnLeszek.addEventListener('click', () => spinWheel('Leszek'));
    btnMartyna.addEventListener('click', () => spinWheel('Martyna'));

    // --- LOGIKA PLAYERA AUDIO DLA PIOSENEK ---
    let currentAudio = null;
    let currentMusicButton = null;

    function playTrack(fileName, buttonElement) {
        if (currentAudio && currentAudio.src.includes(encodeURIComponent(fileName))) {
            stopAudio();
            return;
        }
        stopAudio();

        currentAudio = new Audio(fileName);
        currentMusicButton = buttonElement;
        currentMusicButton.classList.add('playing');

        currentAudio.play().catch(error => {
            alert("Nie znaleziono pliku audio. Upewnij się, że pliki m4a są wgrane na GitHub w tym samym folderze co index.html!");
            stopAudio();
        });

        currentAudio.onended = function() {
            stopAudio();
        };
    }

    function stopAudio() {
        if (currentAudio) {
            currentAudio.pause();
            currentAudio = null;
        }
        if (currentMusicButton) {
            currentMusicButton.classList.remove('playing');
            currentMusicButton = null;
        }
    }
</script>

</body>
</html>
