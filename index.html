<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Koło Fortuny - Audio Edition</title>
    <style>
        * {
            box-sizing: border-box;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* Kontener całoekranowy */
        .background-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            background-image: url('bg.png');
            background-size: contain; 
            background-position: center;
            background-repeat: no-repeat;
        }

        /* Obszar koła */
        .wheel-area {
            position: absolute;
            width: 44.5vh; 
            height: 44.5vh;
            left: 50%;
            top: 50.5%; 
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .wheel-wrapper {
            position: relative;
            width: 100%;
            height: 100%;
        }

        /* Tarcza koła SVG z płynnym hamowaniem (7 sekund) */
        .wheel-svg {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 6px solid #d4af37;
            box-shadow: 0 0 25px rgba(0,0,0,0.6), inset 0 0 15px rgba(0,0,0,0.5);
            transition: transform 7s cubic-bezier(0.1, 0.9, 0.15, 1);
            background: #222;
            display: block;
        }

        /* Znacznik / Strzałka u góry */
        .pointer {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 32px;
            height: 42px;
            background: #d4af37;
            clip-path: polygon(50% 100%, 0 0, 100% 0);
            z-index: 30;
            filter: drop-shadow(0px 5px 4px rgba(0,0,0,0.5));
        }

        /* Przycisk START */
        .spin-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 75px;
            height: 75px;
            background: radial-gradient(circle, #fff 0%, #f3f3f3 60%, #d4af37 100%);
            border: 3px solid #d4af37;
            border-radius: 50%;
            cursor: pointer;
            z-index: 25;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 14px;
            color: #222;
            box-shadow: 0 6px 15px rgba(0,0,0,0.5), inset 0 2px 4px rgba(255,255,255,0.8);
            user-select: none;
            transition: transform 0.1s;
        }

        .spin-button:active {
            transform: translate(-50%, -50%) scale(0.92);
        }

        /* Styl napisów wewnątrz SVG */
        .wheel-text {
            font-weight: bold;
            font-size: 14px;
            fill: #ffffff;
            font-family: sans-serif;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.9);
        }

        /* Wynik na dole */
        .result-display {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(255, 255, 255, 0.95);
            padding: 12px 35px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 20px;
            color: #111;
            border: 3px solid #d4af37;
            box-shadow: 0 6px 20px rgba(0,0,0,0.3);
            display: none;
            z-index: 40;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="background-container">
    <div class="wheel-area">
        <div class="pointer"></div>
        <div class="spin-button" id="spinBtn">START</div>
        
        <div class="wheel-wrapper">
            <svg class="wheel-svg" id="wheel" viewBox="0 0 200 200">
                <g id="wheel-group"></g>
            </svg>
        </div>
    </div>

    <div class="result-display" id="resultDisplay">Wynik: -</div>
</div>

<script>
    const segments = ["5", "10", "25", "50", "-50", "-25", "kręć\n2 razy"];
    const colors = ["#1a1a1a", "#d4af37", "#333333", "#b8901c", "#222222", "#e5c158", "#444444"];
    
    const numSegments = segments.length;
    const anglePerSegment = 360 / numSegments;
    const wheelGroup = document.getElementById('wheel-group');

    // Generowanie koła SVG
    for (let i = 0; i < numSegments; i++) {
        const startAngle = i * anglePerSegment;
        const endAngle = startAngle + anglePerSegment;
        
        const r = 100; 
        const x1 = 100 + r * Math.cos((startAngle - 90) * Math.PI / 180);
        const y1 = 100 + r * Math.sin((startAngle - 90) * Math.PI / 180);
        const x2 = 100 + r * Math.cos((endAngle - 90) * Math.PI / 180);
        const y2 = 100 + r * Math.sin((endAngle - 90) * Math.PI / 180);
        
        const pathData = `M 100 100 L ${x1} ${y1} A ${r} ${r} 0 0 1 ${x2} ${y2} Z`;
        
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", pathData);
        path.setAttribute("fill", colors[i % colors.length]);
        wheelGroup.appendChild(path);

        const textAngle = startAngle + anglePerSegment / 2;
        const textG = document.createElementNS("http://www.w3.org/2000/svg", "g");
        
        textG.setAttribute("transform", `rotate(${textAngle} 100 100) translate(100, 32)`);
        
        const textLines = segments[i].split('\n');
        textLines.forEach((line, index) => {
            const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
            text.textContent = line;
            text.setAttribute("class", "wheel-text");
            text.setAttribute("text-anchor", "middle");
            text.setAttribute("y", index * 14); 
            textG.appendChild(text);
        });
        
        wheelGroup.appendChild(textG);
    }

    const wheel = document.getElementById('wheel');
    const spinBtn = document.getElementById('spinBtn');
    const resultDisplay = document.getElementById('resultDisplay');

    let currentRotation = 0;
    let isSpinning = false;

    // --- SYNTEZA DŹWIĘKÓW (Web Audio API) ---
    let audioCtx = null;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    // Krótkie "kliknięcie" (cykanie tarczy o wskaźnik)
    function playClickSound() {
        if (!audioCtx) return;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(400, audioCtx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(10, audioCtx.currentTime + 0.04);
        
        gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start();
        osc.stop(audioCtx.currentTime + 0.05);
    }

    // Krótkie, radosne fanfary po wygranej
    function playWinSound() {
        if (!audioCtx) return;
        const notes = [261.63, 329.63, 392.00, 523.25]; // C4, E4, G4, C5
        const now = audioCtx.currentTime;
        
        notes.forEach((freq, index) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'sine';
            osc.frequency.setValueAtTime(freq, now + index * 0.12);
            
            gain.gain.setValueAtTime(0, now + index * 0.12);
            gain.gain.linearRampToValueAtTime(0.2, now + index * 0.12 + 0.02);
            gain.gain.exponentialRampToValueAtTime(0.001, now + index * 0.12 + 0.3);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start(now + index * 0.12);
            osc.stop(now + index * 0.12 + 0.35);
        });
    }

    // Funkcja do symulacji cykania dopasowanego do prędkości koła
    function simulateClicking(totalDuration, totalDegrees) {
        let elapsed = 0;
        const interval = 20; // sprawdzenie pozycji co 20ms
        let lastSegmentIndex = -1;

        // Krzywa odpowiadająca cubic-bezier(0.1, 0.9, 0.15, 1)
        function getProgress(t) {
            return 1 - Math.pow(1 - t, 4); // przybliżenie spowolnienia
        }

        const checkClick = setInterval(() => {
            elapsed += interval;
            const t = elapsed / totalDuration;
            
            if (t >= 1) {
                clearInterval(checkClick);
                return;
            }

            const currentProgressDegrees = totalDegrees * getProgress(t);
            const currentSegmentIndex = Math.floor((currentProgressDegrees % 360) / anglePerSegment);

            if (currentSegmentIndex !== lastSegmentIndex) {
                playClickSound();
                lastSegmentIndex = currentSegmentIndex;
            }
        }, interval);
    }

    // Obsługa kliknięcia START
    spinBtn.addEventListener('click', () => {
        if (isSpinning) return;
        
        initAudio(); // Aktywacja audio context po interakcji użytkownika
        
        isSpinning = true;
        resultDisplay.style.display = 'none';

        const randomSpins = Math.floor(Math.random() * 5) + 8; 
        const randomDegrees = Math.floor(Math.random() * 360);
        const additionalDegrees = (randomSpins * 360) + randomDegrees;
        
        currentRotation += additionalDegrees;
        wheel.style.transform = `rotate(${currentRotation}deg)`;

        // Uruchomienie efektu dźwiękowego klikania (trwa 7000ms)
        simulateClicking(7000, additionalDegrees);

        setTimeout(() => {
            isSpinning = false;
            
            let actualAngle = (360 - (currentRotation % 360)) % 360;
            let winningIndex = Math.floor(actualAngle / anglePerSegment);
            winningIndex = (winningIndex + numSegments) % numSegments;
            
            const prize = segments[winningIndex].replace('\n', ' ');
            
            resultDisplay.innerText = `Wylosowano: ${prize}`;
            resultDisplay.style.display = 'block';
            
            // Odtwórz dźwięk wygranej
            playWinSound();
        }, 7000); 
    });
</script>

</body>
</html>
